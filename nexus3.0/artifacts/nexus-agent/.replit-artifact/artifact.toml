kind = "web"
previewPath = "/"
title = "Nexus Agent"
version = "1.0.0"
id = "artifacts/nexus-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18873

[services.development]
run = "pnpm --filter @workspace/nexus-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus-agent", "run", "build" ]
publicDir = "artifacts/nexus-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18873"
BASE_PATH = "/"
